                    .sort((a, b) => b.update_id - a.update_id);
                
                if (channelMessages.length > 0) {
                    const latestUpdate = channelMessages[0];
                    const latestMsg = latestUpdate.channel_post || latestUpdate.edited_channel_post;
                    
                    latestPriceMessage = {
                        text: latestMsg.text || latestMsg.caption || '',
                        date: new Date(latestMsg.date * 1000)
                    };
                }
                
                return latestPriceMessage;
                
            } catch (error) {
                return latestPriceMessage;
            }
        }

        function parseExchangeRates(priceText) {
            if (!priceText) return null;
            
            const rates = {};

            const buyMatch = priceText.match(/(?:الشراء|شراء)[\s\:]*(\d+[\.,]?\d*)/i);
            if (buyMatch) rates.buy = parseFloat(buyMatch[1].replace(',', ''));

            const sellMatch = priceText.match(/(?:البيع|بيع)[\s\:]*(\d+[\.,]?\d*)/i);
            if (sellMatch) rates.sell = parseFloat(sellMatch[1].replace(',', ''));
            
            const syrianMatch = priceText.match(/(?:سوريا|ليرة|ل\.س|SYP)[\s\:]*(\d+[\.,]?\d*)/i);
            if (syrianMatch) rates.syrian = parseFloat(syrianMatch[1].replace(',', ''));
            
            const dollarMatch = priceText.match(/(?:دولار|USD|دولار امريكي)[\s\:]*(\d+[\.,]?\d*)/i);
            if (dollarMatch) rates.dollar = parseFloat(dollarMatch[1].replace(',', ''));
            
            if (!rates.buy && !rates.sell && !rates.syrian && !rates.dollar) {
                const numbers = priceText.match(/\d{3,}[\.,]?\d*/g);
                if (numbers && numbers.length > 0) {
                    rates.general = parseFloat(numbers[0].replace(',', ''));
                }
            }
            
            return rates;
        }

        function parseNumericPrice(candidates) {
            for (const raw of candidates) {
                if (raw === undefined || raw === null || raw === '') continue;
                const cleaned = String(raw).replace(/[٠-٩]/g, d => String(d.charCodeAt(0) - 0x0660))
                    .replace(/[٬,]/g, '')
                    .trim();
                const num = parseFloat(cleaned);
                if (!isNaN(num) && num > 0) {
                    return Math.round(num * 100) / 100;
                }
            }
            return 0;
        }

        function normalizeProductName(rawName) {
            let name = String(rawName || '').trim();
            name = name.replace(/[\u200B-\u200F\uFEFF]/g, '');
            name = name.replace(/[_]{1,}/g, ' ');
            name = name.replace(/[-]{2,}/g, ' ');
            name = name.replace(/\s{2,}/g, ' ');
            name = name.replace(/\b[A-Z0-9]{6,}\b/g, m => /\d/.test(m) && /[A-Z]/.test(m) ? '' : m);
            name = name.replace(/\s{2,}/g, ' ').trim();
            if (!name) name = String(rawName || '').trim();
            return name;
        }

        async function fetchProducts(forceRefresh = false) {
            const now = Date.now();
            
            if (!forceRefresh && cachedProducts && (now - productsLastFetch) < CACHE_DURATION) {
                return cachedProducts;
            }
            
            try {
                const proxyUrls = [
                    `https://api.allorigins.win/raw?url=${encodeURIComponent(PRODUCTS_API_URL)}`,
                    `https://corsproxy.io/?${encodeURIComponent(PRODUCTS_API_URL)}`,
                    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(PRODUCTS_API_URL)}`
                ];
                
                let products = null;
                
                for (const proxyUrl of proxyUrls) {
                    try {
                        const controller = new AbortController();
                        setTimeout(() => controller.abort(), 10000);
                        
                        const response = await fetch(proxyUrl, {
                            signal: controller.signal,
                            headers: { "api-token": PRODUCTS_API_TOKEN }
                        });
                        
                        if (response.ok) {
                            const text = await response.text();
                            const data = JSON.parse(text);
                            if (Array.isArray(data)) products = data;
                            else if (data.data && Array.isArray(data.data)) products = data.data;
                            else if (data.products && Array.isArray(data.products)) products = data.products;
                            
                            if (products && products.length > 0) break;
                        }
                    } catch (error) {}
                }
                
                if (!products && cachedProducts) return cachedProducts;
                if (!products || products.length === 0) return null;
                
                const enhancedProducts = products.map(p => {
                    const sellCandidates = [
                        p.sale_price, p.selling_price, p.sell_price, p.sellPrice,
                        p.retail_price, p.customer_price, p.final_price, p.total_price,
                        p.price_syp, p.priceSyp, p.price, p.amount, p.value
                    ];
                    const buyCandidates = [
                        p.buy_price, p.buyPrice, p.purchase_price, p.cost_price,
                        p.wholesale_price, p.cost
                    ];

                    const parsedSell = parseNumericPrice(sellCandidates);
                    const parsedBuy = parseNumericPrice(buyCandidates);

                    const price = parsedSell > 0 ? parsedSell : (parsedBuy > 0 ? parsedBuy : 0);
                    const costPrice = parsedBuy > 0 ? parsedBuy : null;

                    const rawName = p.name || p.title || p.product_name || p.label || '';
                    const name = normalizeProductName(rawName);

                    return {
                        name,
                        price,
                        costPrice,
                        isValidPrice: price > 0,
                        description: p.description || '',
                        nameLower: name.toLowerCase()
                    };
                });
                
                const validProducts = enhancedProducts.filter(p => p.isValidPrice);
                const sortedAsc = [...validProducts].sort((a, b) => a.price - b.price);
                
                cachedProducts = {
                    raw: enhancedProducts,
                    validRaw: validProducts,
                    total: enhancedProducts.length,
                    cheapest: sortedAsc.slice(0, 20),
                    mostExpensive: [...validProducts].sort((a, b) => b.price - a.price).slice(0, 20),
                    gamingProducts: enhancedProducts.filter(p => 
                        p.nameLower.includes('pubg') || p.nameLower.includes('free fire') || 
                        p.nameLower.includes('mobile legend') || p.nameLower.includes('cod') ||
                        p.nameLower.includes('ببجي') || p.nameLower.includes('فري فاير')
                    )
                };
                
                productsLastFetch = now;
                
                return cachedProducts;
                
            } catch (error) {
                return cachedProducts;
            }
        }

        function normalizeDigits(str) {
            return str.replace(/[٠-٩]/g, d => String(d.charCodeAt(0) - 0x0660))
                      .replace(/[۰-۹]/g, d => String(d.charCodeAt(0) - 0x06F0));
        }

        function searchProducts(query, productsData) {
            if (!productsData || !productsData.raw) return [];
            
            const q = normalizeDigits(query.toLowerCase().trim());
            
            const gameKeywords = {
                'pubg': ['pubg', 'ببجي', 'بابجي', 'بوبجي', 'player unknown', 'باتل جراوند'],
                'freefire': ['free fire', 'فري فاير', 'فري', 'freefire', 'جيرينا'],
                'mobilelegend': ['mobile legend', 'موبايل ليجند', 'mlbb', 'ml', 'موبايل'],
                'cod': ['call of duty', 'كول اوف ديوتي', 'كود', 'codm'],
                'fortnite': ['fortnite', 'فورتنايت', 'فورت'],
                'battlefield': ['battlefield', 'باتل فيلد', 'باتلفيلد'],
                'pubg_uc': ['uc', 'يوسي', 'unknown cash', 'شحن pubg', 'شدة', 'شدات', 'شدّة', 'شدّات'],
                'pubg_prime': ['prime', 'بريميوم', 'برايم', 'اشتراك pubg'],
                'diamonds': ['diamond', 'دايموند', 'الماس', 'جواهر', 'gems', 'ماسات'],
                'topup': ['شحن', 'top up', 'topup', 'recharge', 'رصيد', 'تعبئة']
            };
            
            const matchedGames = [];
            for (const [game, keywords] of Object.entries(gameKeywords)) {
                if (keywords.some(k => q.includes(k))) {
                    matchedGames.push(game);
                }
            }
            
            const isCurrencyQuestion = q.includes('سعر الصرف') || q.includes('الدولار') ||
                q.includes('الليرة') || q.includes('تحويل العملة') || q.includes('سعر الدولار');
            if (isCurrencyQuestion && matchedGames.length === 0) {
                return null;
            }
            
            const queryNumbers = (q.match(/\d+/g) || []).map(n => n.trim());

            if (matchedGames.length > 0) {
                let results = productsData.raw.filter(product => {
                    return matchedGames.some(game => {
                        const keywords = gameKeywords[game];
                        return keywords.some(k => product.nameLower.includes(k));
                    });
                });

                if (queryNumbers.length > 0) {
                    const exactMatches = results.filter(p =>
                        queryNumbers.some(num => new RegExp(`(^|[^0-9])${num}([^0-9]|$)`).test(normalizeDigits(p.nameLower)))
                    );
                    if (exactMatches.length > 0) results = exactMatches;
                }
                
                results.sort((a, b) => {
                    const aScore = matchedGames.filter(g => 
                        gameKeywords[g].some(k => a.nameLower.includes(k))
                    ).length;
                    const bScore = matchedGames.filter(g => 
                        gameKeywords[g].some(k => b.nameLower.includes(k))
                    ).length;
                    return bScore - aScore;
                });
                
                return results.slice(0, 10);
            }
            
            if (q.includes('أرخص') || q.includes('ارخص')) return productsData.cheapest.slice(0, 10);
            if (q.includes('أغلى') || q.includes('اغلى')) return productsData.mostExpensive.slice(0, 10);
            
            const searchTerms = q.split(/\s+/).filter(w => w.length >= 2);
            if (searchTerms.length > 0) {
                const results = productsData.raw.filter(p => 
                    searchTerms.some(term => p.nameLower.includes(term))
                ).slice(0, 5);
                if (results.length > 0) return results;
            }
            
            return productsData.cheapest.slice(0, 5);
        }

                .replace(/[\u4E00-\u9FFF\u3400-\u4DBF]/g, '')

=== قاعدة العملات (مهم جداً) ===
- كل الأسعار في قسم "منتجات مطابقة" أعلاه مُخزَّنة أصلاً بالليرة السورية (${BASE_CURRENCY_LABEL}). هذه هي العملة الأساسية دائماً في قاعدة البيانات، بغض النظر عن لغة أو عملة سؤال العميل.
- إذا سأل العميل عن سعر منتج بالليرة السورية مباشرة: اذكر السعر كما هو من قائمة "منتجات مطابقة" أعلاه، مقرَّباً لرقم صحيح مع الفاصلة الألفية، بدون أي عملية حسابية إضافية.
- إذا سأل العميل عن سعر منتج بعملة أخرى (كالدولار الأمريكي)، اتبع هذا الترتيب دائماً:
  1) خذ سعر المنتج الفعلي بالليرة السورية من قائمة "منتجات مطابقة" أعلاه (لا تخترعه أبداً).
  2) خذ سعر الصرف الحالي (دولار/ليرة) من قسم "بيانات أسعار الصرف الحالية" أعلاه — استخدم سعر البيع تحديداً إن وُجد (وليس سعر الشراء) لأنه الأقرب لما يدفعه العميل فعلياً.
  3) اقسم سعر المنتج بالليرة السورية على سعر الصرف للحصول على السعر بالدولار، واذكر الناتج مع ذكر تاريخ سعر الصرف المستخدم، بدقة رقمين عشريين كحد أقصى.
  4) لا تفعل هذا التحويل إطلاقاً إذا لم يكن سعر الصرف متوفراً في البيانات أعلاه — بدلاً من ذلك أخبر العميل أن سعر الصرف غير محدَّث حالياً واعرض عليه السعر بالليرة السورية فقط.
- لا تخلط أبداً بين عملة السؤال وعملة التخزين، ولا تفترض أبداً أن الأسعار المذكورة في قائمة المنتجات هي بالدولار.

=== قواعد صارمة لمنع الأخطاء (الأهم على الإطلاق) ===
1. ممنوع نهائياً اختراع أي سعر غير موجود حرفياً في البيانات أعلاه. إذا كان سعر منتج يظهر "0" أو غير موجود في قائمة "منتجات مطابقة"، فهذا يعني أن السعر غير متوفر حالياً — لا تكتب "0 ل.س" ولا "0 دولار" ولا "سعر خاص" أبداً؛ بدلاً من ذلك قل بوضوح إن السعر غير متوفر حالياً بدقة ووجّه العميل للدعم.
2. إذا لم يكن هناك أي منتج مطابق فعلياً لما طلبه العميل ضمن "منتجات مطابقة"، قل ذلك بصراحة ولا تخترع فئات أو كميات وهمية.
3. أجب حصراً بحروف عربية سليمة (ويمكن إنجليزية/أرقام/إيموجي شائعة عند الحاجة)، ولا تُدرج إطلاقاً أي حرف من لغات أخرى مثل الصينية أو اليابانية أو الكورية أو أي رموز غريبة لا معنى لها.
4. أنهِ ردك دائماً كجملة كاملة ومفهومة.
5. اكتب الأسعار دائماً كأرقام صحيحة مفصولة بفاصلة الآلاف للأسعار بالليرة السورية.
6. ممنوع نهائياً استخدام رموز الماركداون الخام مثل ** أو #.
7. عند عرض قوائم أسعار بها عدة فئات، اختصر واذكر فقط الفئات الأهم.

=== كيف تفهم وتعرض المنتجات (مهم جداً) ===
1. أسماء المنتجات القادمة من نظام المتجر قد تكون فوضوية أو غير مفهومة (بالإنجليزية، أو فيها رموز/أكواد زائدة). لا تنسخها كما هي حرفياً؛ افهم نوع الخدمة الحقيقي من الاسم (لعبة، فئة شحن، مدة اشتراك، عدد وحدات) ثم اذكره للعميل باسم عربي واضح ومختصر.
2. لا تخترع اسم منتج غير موجود أصلاً، فقط أعد صياغة الاسم الموجود فعلياً بشكل مفهوم.
3. عند عرض أكثر من منتج بنفس الاستجابة، رتّبها بشكل منطقي (من الأرخص للأغلى، أو حسب الفئة إن كانت من ألعاب مختلفة)، ولا تعرضها بترتيب عشوائي.
4. إذا تشابهت عدة منتجات بنفس الاسم تقريباً (فروقها فقط بالكمية أو المدة)، اعرضها كقائمة مرتبة بنفس الفئة بدلاً من تكرار الشرح لكل واحد.
5. افهم القصد الحقيقي من سؤال العميل بذكاء حتى لو كان مختصراً أو بلهجة عامية.
6. أجب بشكل مباشر ومحدد قدر الإمكان، ورد بنفس اللغة أو اللهجة التي يكتب بها العميل.
7. استخدم فقط الأسعار والمنتجات الموجودة فعلياً في البيانات أعلاه، ولا تُقرِّب أو تُخمِّن أي رقم.
8. إذا سأل عن سياسة الخصوصية أو الدعم أو التسجيل أو التوثيق، استخدم قسم "معرفة شاملة عن المتجر" أعلاه بدقة تامة دون حذف أي خطوة.

        function buildHistoryForGroq() {
            return chatMessages
                .slice(1)
                .slice(-12)
                .map(m => ({ role: m.sender === 'user' ? 'user' : 'assistant', content: m.text }));
        }

        function buildHistoryForGemini() {
            return chatMessages
                .slice(1)
                .slice(-12)
                .map(m => ({ role: m.sender === 'user' ? 'user' : 'model', parts: [{ text: m.text }] }));
        }

        async function getGroqReply(userQuestion) {
            const systemInstruction = buildSystemInstruction(userQuestion);
            const baseMessages = [
                { role: "system", content: systemInstruction },
                ...buildHistoryForGroq()
            ];

            async function callGroq(messages) {
                const response = await nativeHttpPost("https://api.groq.com/openai/v1/chat/completions", {"Authorization": `Bearer ${GROQ_API_KEY}`}, {model:"llama-3.3-70b-versatile", messages, temperature:0.3, max_tokens:2048});

                if (!response.ok) {
                    const errText = await response.text().catch(() => '');
                    throw new Error(`Groq HTTP ${response.status}: ${errText.substring(0, 300)}`);
                }

                const data = await response.json();
                const choice = data?.choices?.[0];
                const text = choice?.message?.content;
                if (!text) throw new Error(`Groq رجع رد فارغ.`);
                return { text, finishReason: choice.finish_reason };
            }

            let { text, finishReason } = await callGroq(baseMessages);
            let fullText = text;
            let messages = baseMessages;
            let continuations = 0;

            while (finishReason === 'length' && continuations < 3) {
                messages = [
                    ...messages,
                    { role: 'assistant', content: fullText },
                    { role: 'user', content: 'أكمل ردّك بالضبط من النقطة التي توقفت عندها.' }
                ];
                const cont = await callGroq(messages);
                fullText += cont.text;
                finishReason = cont.finishReason;
                continuations++;
            }

            return fullText;
        }

        async function getGeminiReply(userQuestion) {
            const systemInstruction = buildSystemInstruction(userQuestion);
            const MODEL_CANDIDATES = ['gemini-flash-latest', 'gemini-2.5-flash', 'gemini-3.5-flash'];

            async function callGemini(modelName, contents) {
                const response = await nativeHttpPost(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${GEMINI_API_KEY}`, {}, {contents, systemInstruction:{parts:[{text:systemInstruction}]}, generationConfig:{temperature:0.3, maxOutputTokens:2048}});

                if (!response.ok) {
                    const errText = await response.text().catch(() => '');
                    throw new Error(`[${modelName}] HTTP ${response.status}: ${errText.substring(0, 300)}`);
                }

                const data = await response.json();
                const candidate = data?.candidates?.[0];
                const text = candidate?.content?.parts?.[0]?.text;
                if (!text) throw new Error(`[${modelName}] رجع رد فارغ.`);
                return { text, finishReason: candidate.finishReason };
            }

            let lastError = null;
            for (const modelName of MODEL_CANDIDATES) {
                try {
                    let contents = buildHistoryForGemini();
                    let { text, finishReason } = await callGemini(modelName, contents);
                    let fullText = text;
                    let continuations = 0;

                    while (finishReason === 'MAX_TOKENS' && continuations < 3) {
                        contents = [
                            ...contents,
                            { role: 'model', parts: [{ text: fullText }] },
                            { role: 'user', parts: [{ text: 'أكمل ردّك بالضبط من النقطة التي توقفت عندها.' }] }
                        ];
                        const cont = await callGemini(modelName, contents);
                        fullText += cont.text;
                        finishReason = cont.finishReason;
                        continuations++;
                    }

                    return fullText;
                } catch (err) {
                    lastError = err;
                }
            }

            throw lastError || new Error('فشل الاتصال بـ Gemini');
        }

            body.scrollTop = body.scrollHeight;

            let aiReply;
            try {
                aiReply = await getGroqReply(text);
            } catch (groqErr) {
                try {
                    aiReply = await getGeminiReply(text);
                } catch (geminiErr) {
                    try {
                        aiReply = await getHFReply(text);
                    } catch (hfErr) {
                        aiReply = generateSmartResponse(text);
                    }
                }
            }

            aiReply = cleanAIText(aiReply);
            
            if (thinking) thinking.remove();
            chatMessages.push({ sender: 'ai', text: aiReply });
            renderChat();
        }

        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendAI();
        });

        Promise.all([fetchProducts(), fetchLatestPriceFromChannel()]);
    </script>
</body>
